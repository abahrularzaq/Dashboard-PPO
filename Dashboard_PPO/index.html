<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitoring Transaksi Obat</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Dashboard Monitoring Transaksi 2025</h1>
            <p>Prekursor, Psikotropika, & Obat Tertentu</p>
        </header>

        <main>
            <section class="summary-cards">
                <div class="card">
                    <h3>Total Transaksi</h3>
                    <p id="total-transaksi">0</p>
                </div>
                <div class="card">
                    <h3>Total Volume</h3>
                    <p id="total-volume">0</p>
                </div>
            </section>

            <div class="card">
    <h3>Kategori Terdeteksi</h3>
    <p id="total-kategori">0</p>
</div>

            <section class="charts">
                <canvas id="transaksiChart"></canvas>
            </section>

            <section class="data-table">
                <h3>Rekap Data Per Produk</h3>
                <table id="table-rekap">
                    <thead>
                        <tr>
                            <th>Nama Produk</th>
                            <th>Total Order</th>
                            <th>Frekuensi</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </section>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.min.js"></script>

<section class="upload-section">
    <input type="file" id="upload-excel" accept=".xlsx, .xls">
    <button id="btn-proses" style="padding: 5px 15px; cursor: pointer;">Proses Data</button>
    <p>Pilih file lalu klik tombol "Proses Data".</p>
</section>

        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
