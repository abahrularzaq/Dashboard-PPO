<!DOCTYPE html>
<html>
<head>
    <style>
        /* Taruh semua kode CSS Anda di sini */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 105vh;
            font-family: Arial, sans-serif;
        }
        .card {
            background: hwb(251 2% 19%);
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 250px;
            transition: transform 0.3s ease;
        }
        /* ... dan seterusnya ... */
    </style>
</head>
<body>
    <div class="card">
      <img src="https://via.placeholder.com/100" alt="Profile">
      <h1>ABAH</h1>
      <p>APOTEKER</p>
      <button>Kontak Saya</button>
    </div>
</body>
</html>
