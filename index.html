<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
    <header>
        <h1>Sistem Monitoring Stok</h1>
        <p>User: <strong>abahrul</strong></p>
    </header>

    <hr>

    <section>
        <h2>Detail Komoditas</h2>
        <ul>
            <li><strong>Nama Barang:</strong> Pupuk Organik SFL</li>
            <li><strong>Kategori:</strong> Farm/Gaming</li>
            <li><strong>Status:</strong> <mark>Ready Stock</mark></li>
        </ul>
    </section>

    <section>
        <h3>Update Data Stok</h3>
        <form>
            <div>
                <label for="qty">Jumlah Masuk:</label>
                <input type="number" id="qty" name="qty" min="1" required>
            </div>
            <br>
            <div>
                <label for="catatan">Catatan Distribusi:</label><br>
                <textarea id="catatan" name="catatan" placeholder="Contoh: Batch #102 - Kirim ke gudang utama"></textarea>
            </div>
            <br>
            <button type="submit">Konfirmasi Data</button>
        </form>
    </section>
</main>
</body>
</html>
