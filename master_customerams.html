<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Customer AMS</title>
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .container-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
        h2 { color: #2563eb; font-weight: 800; text-align: center; margin-bottom: 25px; text-transform: uppercase; }
        #loading { text-align: center; padding: 40px; }
        table.dataTable thead { background-color: #2563eb; color: white; }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current { background: #2563eb !important; color: white !important; border: none; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="container-box">
        <h2>Daftar Customer AMS</h2>
        
        <div id="loading">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3">Menghubungkan ke Database Google Sheets...</p>
        </div>

        <div id="tableContainer" style="display:none;">
            <table id="tableCustomer" class="table table-striped table-hover display nowrap" style="width:100%">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    // Link export CSV yang sudah terbukti bekerja
    const csv_url = 'https://docs.google.com/spreadsheets/d/1S4CjcAc946V5dzS4na8zEDlSq-YLbcUq8Wp4vWYZkEY/export?format=csv';

    $(document).ready(function() {
        Papa.parse(csv_url, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let data = results.data;
                let columns = results.meta.fields;

                // 1. Render Header
                let headHtml = '<tr>';
                columns.forEach(col => {
                    headHtml += `<th>${col}</th>`;
                });
                headHtml += '</tr>';
                $('#tableHead').html(headHtml);

                // 2. Render Body
                let bodyHtml = '';
                data.forEach(row => {
                    bodyHtml += '<tr>';
                    columns.forEach(col => {
                        bodyHtml += `<td>${row[col] || ''}</td>`;
                    });
                    bodyHtml += '</tr>';
                });
                $('#tableBody').html(bodyHtml);

                // 3. Switch View
                $('#loading').hide();
                $('#tableContainer').show();

                // 4. Jalankan DataTable
                $('#tableCustomer').DataTable({
                    "language": { "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json" },
                    "pageLength": 10,
                    "scrollX": true,
                    "responsive": false
                });
            },
            error: function(err) {
                $('#loading').html('<p class="text-danger">Gagal memuat data. Pastikan koneksi internet stabil.</p>');
            }
        });
    });
</script>

</body>
</html>
